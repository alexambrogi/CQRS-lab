name: DAST - OWASP ZAP


on:
  workflow_run:
    workflows:
      - "SonarQube Analysis"
    types:
      - completed
    branches:
      - master
      - develop

jobs:
  dast:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix ZAP permissions
        run: chmod 777 ${{ github.workspace }}

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: '${{ secrets.APP_URL }}'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-baseline-report

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report-${{ github.run_id }}
          path: |
            report_html.html
            report_json.json
          retention-days: 30

      - name: Stop API
        if: always()
        run: |
          if [ -n "$API_PID" ]; then
            kill $API_PID || true
          fi
